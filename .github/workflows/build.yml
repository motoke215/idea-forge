name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install npm dependencies
        run: npm ci
      
      - name: Build web app
        run: npm run build
      
      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli
      
      - name: Initialize Capacitor
        run: npx cap init "IdeaForge" "com.ideaforge.app" --web-dir=dist
      
      - name: Add Android platform
        run: npm install @capacitor/android && npx cap add android
      
      - name: Sync to Android
        run: npx cap sync android
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: IdeaForge-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
